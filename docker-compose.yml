services:
  postgres:
    image: postgres:17-alpine
    container_name: tarot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tarot_ai
    ports:
      - "5432:5432"
    volumes:
      - tarot-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tarot_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tarot-pgdata:
